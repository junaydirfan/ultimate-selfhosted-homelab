version: "3"

volumes:
  mysql_data:
  romm_resources:
  romm_redis_data:

services:
  romm:
    image: rommapp/romm:latest
    container_name: romm
    restart: unless-stopped
    environment:
      - DB_HOST=romm-db
      - DB_NAME=romm
      - DB_USER=romm-user
      - DB_PASSWD=${ROMM_DB_PASS:?Set ROMM_DB_PASS}
      - ROMM_AUTH_SECRET_KEY=${ROMM_AUTH_SECRET_KEY:?Set ROMM_AUTH_SECRET_KEY}
      # Metadata providers — sign up at their respective sites
      - SCREENSCRAPER_USER=${SCREENSCRAPER_USER:-}
      - SCREENSCRAPER_PASSWORD=${SCREENSCRAPER_PASSWORD:-}
      - RETROACHIEVEMENTS_API_KEY=${RETROACHIEVEMENTS_API_KEY:-}
      - STEAMGRIDDB_API_KEY=${STEAMGRIDDB_API_KEY:-}
      - HASHEOUS_API_ENABLED=true
    volumes:
      - romm_resources:/romm/resources       # Covers, screenshots from IGDB
      - romm_redis_data:/redis-data          # Background task cache
      - /path/to/your/library:/romm/library  # ← UPDATE: your ROM library root
      - /media/save:/romm/assets             # Save states and saves
      - /path/to/config:/romm/config         # Optional: config.yml
    ports:
      - 8090:8080
    depends_on:
      romm-db:
        condition: service_healthy
        restart: true

  romm-db:
    image: mariadb:latest
    container_name: romm-db
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${ROMM_DB_ROOT_PASS:?Set ROMM_DB_ROOT_PASS}
      - MARIADB_DATABASE=romm
      - MARIADB_USER=romm-user
      - MARIADB_PASSWORD=${ROMM_DB_PASS:?Set ROMM_DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 5
